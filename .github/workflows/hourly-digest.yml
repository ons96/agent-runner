name: hourly-digest

# Fires on:
#   - hourly cron (free public-repo minutes; 24/day = 720/month)
#   - manual dispatch (Run workflow button)
#   - repository_dispatch "request-digest" event (lets another repo ping us)
#
# Self-checkout agent-runner for scripts/digest.sh. digest.sh uses gh API only
# (no task-board file reads), posts digest as new issue in agent-runner with
# --repo flag pointing at task-board. DISPATCH_TOKEN secret (PAT w/ repo scope)
# is required for task-board reads + writes via gh API; default GITHUB_TOKEN
# only has agent-runner scope (public) and cannot read private task-board.
#
# Optional secrets/vars:
#   DISPATCH_TOKEN            PAT w/ repo scope on task-board. REQUIRED.
#   TASKBOARD_REPO            "owner/repo" override (default ons96/task-board).
#   DIGEST_TOP_N              default 5.
#   DIGEST_DRY_RUN            "true" to log and exit, no API writes.

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      top_n:
        description: "Top N issues to include"
        required: false
        default: "5"
      dry_run:
        description: "Dry run (no API writes)"
        required: false
        default: "false"
  repository_dispatch:
    types: [request-digest]

permissions:
  contents: read
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    env:
      DISPATCH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
      TASKBOARD_REPO: ${{ vars.TASKBOARD_REPO || 'ons96/task-board' }}
      DIGEST_TOP_N: ${{ github.event.inputs.top_n || '5' }}
      DIGEST_DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install gh
        run: sudo apt-get update -qq && sudo apt-get install -y -qq gh jq >/dev/null

      - name: Build + post digest
        env:
          GH_TOKEN: ${{ secrets.DISPATCH_TOKEN }}
        run: bash scripts/digest.sh
